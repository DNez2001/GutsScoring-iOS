name: GutsScoring
options:
  bundleIdPrefix: com.nezsports
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_KEY_CFBundleDisplayName: Guts Scoring
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.sports
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_BGTaskSchedulerPermittedIdentifiers: com.nezsports.gutsscoring.sync-flush
    DEVELOPMENT_TEAM: ""

targets:
  GutsScoring:
    type: application
    platform: iOS
    sources:
      - path: GutsScoring
        excludes:
          - "**/.DS_Store"
      - path: GutsScoring/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nezsports.gutsscoring
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
    dependencies: []
